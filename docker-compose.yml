version: "3.8"

services:
  backend:
    build: ./backend
    container_name: facerecog-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - SIMILARITY_THRESHOLD=0.45
      - ANTI_SPOOF_ENABLED=true
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: facerecog-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    restart: unless-stopped
